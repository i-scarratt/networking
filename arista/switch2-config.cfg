! Startup configuration for switch2
! Enable IP routing
ip routing

! Configure interface Ethernet1
interface Ethernet1
   no switchport
   ip address 192.168.1.2/24
   no shutdown

! Configure interface Ethernet2
interface Ethernet2
   no switchport
   ip address 192.168.2.2/24
   no shutdown

! Configure BGP
router bgp 65002
   neighbor 192.168.1.1 remote-as 65001
   neighbor 192.168.2.1 remote-as 65003
   address-family ipv4
      neighbor 192.168.1.1 activate
      neighbor 192.168.2.1 activate

! End of configuration