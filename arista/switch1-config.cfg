! Startup configuration for switch1
! Enable IP routing
ip routing

! Configure interface Ethernet1
interface Ethernet1
   no switchport
   ip address 192.168.1.1/24
   no shutdown

! Configure interface Ethernet4
interface Ethernet4
   no switchport
   ip address 192.168.4.1/24
   no shutdown

! Configure BGP
router bgp 65001
   neighbor 192.168.1.2 remote-as 65002
   neighbor 192.168.4.2 remote-as 65004
   address-family ipv4
      neighbor 192.168.1.2 activate
      neighbor 192.168.4.2 activate

! End of configuration