! Startup configuration for switch3
! Enable IP routing
ip routing

! Configure interface Ethernet1
interface Ethernet1
   no switchport
   ip address 192.168.2.1/24
   no shutdown

! Configure interface Ethernet2
interface Ethernet2
   no switchport
   ip address 192.168.3.1/24
   no shutdown

! Configure BGP
router bgp 65003
   neighbor 192.168.2.2 remote-as 65002
   neighbor 192.168.3.2 remote-as 65004
   address-family ipv4
      neighbor 192.168.2.2 activate
      neighbor 192.168.3.2 activate

! End of configuration