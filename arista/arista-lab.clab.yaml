name: arista-test-lab

topology:
  kinds:
    # Setting defaults for all cEOS nodes to keep the file clean
    arista_ceos:
      image: ceos:latest  # Matches the tag used during import
    linux:
      image: ghcr.io/hellt/network-multitool

  nodes:
    switch1:
      kind: arista_ceos
      startup-config: /home/clab/clab-arista-test-lab/networking/arista/clab-arista-test-lab/switch1-config.cfg
    switch2:
      kind: arista_ceos
      startup-config: /home/clab/clab-arista-test-lab/networking/arista/clab-arista-test-lab/switch2-config.cfg
    switch3:
      kind: arista_ceos
      startup-config: /home/clab/clab-arista-test-lab/networking/arista/clab-arista-test-lab/switch3-config.cfg
    switch4:
      kind: arista_ceos
      startup-config: /home/clab/clab-arista-test-lab/networking/arista/clab-arista-test-lab/switch4-config.cfg

    # Adding a host to verify the data plane
    host1:
      kind: linux

  links:
    # Inter-switch link
    - endpoints: ["switch1:eth1", "switch2:eth1"]
    - endpoints: ["switch2:eth2", "switch3:eth1"]
    - endpoints: ["switch3:eth2", "switch4:eth1"]
    - endpoints: ["switch4:eth2", "switch1:eth4"]

    # Switch to host link
    - endpoints: ["switch1:eth3", "host1:eth1"]
    - endpoints: ["switch2:eth3", "host1:eth2"]