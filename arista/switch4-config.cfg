! Startup configuration for switch4
! Enable IP routing
ip routing

! Configure interface Ethernet1
interface Ethernet1
   no switchport
   ip address 192.168.3.2/24
   no shutdown

! Configure interface Ethernet2
interface Ethernet2
   no switchport
   ip address 192.168.4.2/24
   no shutdown

! Configure BGP
router bgp 65004
   neighbor 192.168.3.1 remote-as 65003
   neighbor 192.168.4.1 remote-as 65001
   address-family ipv4
      neighbor 192.168.3.1 activate
      neighbor 192.168.4.1 activate

! End of configuration